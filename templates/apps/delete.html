{% extends "base.html" %}

{% block title %}Delete {{ app.get_type_display }} - App Hub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <a href="{% url 'dashboard' %}" class="inline-flex items-center text-muted hover:text-theme mb-6">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        Back to Dashboard
    </a>

    <div class="bg-theme border-2 border-theme p-8 shadow-theme">
        <h1 class="text-3xl font-bold text-theme mb-2">Delete {{ app.get_type_display }}</h1>
        <p class="text-muted mb-8">Are you sure you want to delete <strong>{{ app.name }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="flex items-center gap-4">
                <button type="submit"
                    class="button-theme px-6 py-3 font-semibold">
                    Yes, Delete
                </button>
                <a href="{% url 'dashboard' %}"
                    class="button-theme px-6 py-3 font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
