<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ app.name }} - App Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        :root {
            --bg-color: white;
            --text-color: black;
            --border-color: black;
            --header-bg: black;
            --header-text: white;
        }
        .dark {
            --bg-color: #111827;
            --text-color: white;
            --border-color: white;
            --header-bg: white;
            --header-text: black;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .border-theme {
            border-color: var(--border-color);
        }
        .text-theme {
            color: var(--text-color);
        }
        .bg-theme {
            background-color: var(--bg-color);
        }
        .header-bg {
            background-color: var(--header-bg);
        }
        .header-text {
            color: var(--header-text);
        }
        .button-theme {
            border: 2px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 150ms ease;
        }
        .button-theme:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="header-bg header-text py-3 px-4 border-b-2 border-theme">
        <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
            <div class="flex items-center gap-4 flex-wrap">
                <a href="{% url 'dashboard' %}" class="text-sm font-medium hover:text-gray-300 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back to Dashboard
                </a>
                <span class="text-gray-400">|</span>
                <a href="{% url 'site_public' app.slug %}" target="_blank" class="text-sm font-medium hover:text-gray-300 transition-colors">
                    View Public Site
                </a>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <span class="text-sm font-semibold">Editing: {{ app.name }}</span>
                <form method="post" action="{% url 'site_toggle_visibility' app.slug %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="border-2 border-theme bg-header-bg text-header-text px-3 py-1.5 text-xs font-semibold hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        {% if app.is_public %}Make Private{% else %}Make Public{% endif %}
                    </button>
                </form>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {{ app_content|safe }}
    </main>
    <script>
        // Dark mode init
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
