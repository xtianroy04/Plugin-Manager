{% extends 'base.html' %}

{% block title %}{{ app.name }}{% endblock %}

{% block content %}
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                <div class="flex items-center">
                    {% if app.logo %}
                        <img src="{{ app.logo.url }}" alt="{{ app.name }}" class="w-12 h-12 mr-4 border-2 border-theme">
                    {% endif %}
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-theme">{{ app.name }}</h1>
                        <p class="text-muted">v{{ app.version }}</p>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-2">
                    <a href="{% url 'dashboard' %}" class="button-theme px-5 py-2.5 font-semibold text-center">
                        Back to Dashboard
                    </a>
                    <form method="post" action="{% url 'plugin_delete' app.slug %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="w-full sm:w-auto button-theme px-5 py-2.5 font-semibold" onclick="return confirm('Are you sure you want to delete this plugin?')">
                            Delete Plugin
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="bg-theme border-2 border-theme overflow-hidden shadow-theme">
            {% if app.description %}
                <div class="p-6 border-b border-theme">
                    <p class="text-muted">{{ app.description }}</p>
                </div>
            {% endif %}
            <div class="p-6">
                {{ app_content|safe }}
            </div>
        </div>
    </div>
{% endblock %}
