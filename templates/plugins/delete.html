{% extends 'base.html' %}

{% block title %}Delete Plugin{% endblock %}

{% block content %}
    <div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Delete Plugin</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to delete "{{ plugin.name }}"?</p>
        <div class="flex space-x-4">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                    Yes, Delete
                </button>
            </form>
            <a href="{% url 'plugin_list' %}" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                Cancel
            </a>
        </div>
    </div>
{% endblock %}
