{% extends 'base.html' %}

{% block title %}Upload Plugin{% endblock %}

{% block content %}
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Upload Plugin</h1>
        <p class="text-gray-600">Install a new plugin</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6 max-w-2xl">
        {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-4 rounded mb-6 flex items-center">
                <svg class="w-6 h-6 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="font-medium">{{ error }}</span>
            </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Plugin Name</label>
                <input type="text" name="name" id="name" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" id="description" rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div>
                <label for="logo" class="block text-sm font-medium text-gray-700 mb-1">Logo (optional - will use logo from ZIP if available)</label>
                <input type="file" name="logo" id="logo" accept="image/*"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="plugin_zip" class="block text-sm font-medium text-gray-700 mb-1">Plugin Zip File</label>
                <input type="file" name="plugin_zip" id="plugin_zip" accept=".zip" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex space-x-4">
                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Upload Plugin
                </button>
                <a href="{% url 'plugin_list' %}" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
{% endblock %}
